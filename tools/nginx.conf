server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    # Flask Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:5001/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Handle CORS
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,ngrok-skip-browser-warning,Bypass-Tunnel-Reminder';
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range';
    }

    # Flask Media Files
    location /data/ {
        proxy_pass http://127.0.0.1:5001/data/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Enable Range requests for video seeking
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
    }

    # SRS HTTP-FLV Streaming
    location /live/ {
        proxy_pass http://127.0.0.1:8082/live/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # Disable buffering for real-time video
        proxy_buffering off;
        tcp_nodelay on;

        # Let SRS handle CORS itself, just proxy the OPTIONS request if needed
        if ($request_method = 'OPTIONS') {
            # Since we removed Nginx CORS headers, let the proxy handle it or return 204 if SRS doesn't. 
            # Actually, SRS handles OPTIONS, so we can just pass it.
        }
    }
}
